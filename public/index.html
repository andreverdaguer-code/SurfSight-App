<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>SurfSight Device Manager</title>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div id="sidebar-header">
                <div class="app-name">SurfSight</div>
                <div class="app-sub">Device Manager</div>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html" class="active"><span class="nav-icon">⚙</span> Manage</a></li>
                    <li><a href="validate.html"><span class="nav-icon">✓</span> Verify</a></li>
                </ul>
            </nav>
        </aside>

        <div id="main">
            <div id="page-header">
                <h1>Manage Devices</h1>
                <p>Update billing status or quality level across devices</p>
            </div>

            <div id="page-content">
                <!-- Actions -->
                <div class="panel">
                    <div class="panel-title">Device Actions</div>
                    <div class="controls-row">
                        <select name="status">
                            <option value="" disabled selected>Select Status</option>
                            <option value="pendingActivation">Activate</option>
                            <option value="deactivated">Deactivate</option>
                            <option value="suspended">Suspend</option>
                        </select>
                        <span class="sep">or</span>
                        <select name="quality">
                            <option value="" disabled selected>Select Quality</option>
                            <option value="2">Level 1 – Lowest Bitrate</option>
                            <option value="3">Level 2 – Low Bitrate</option>
                            <option value="4">Level 3 – Standard Quality</option>
                            <option value="5">Level 4 – High Quality</option>
                            <option value="6">Level 5 – Extreme Quality</option>
                        </select>
                    </div>

                    <div id="imeiInput">
                        <div class="imei-label-row">
                            <label for="message">IMEIs</label>
                            <label for="csvFile" class="csv-import-btn">Import CSV</label>
                            <input id="csvFile" type="file" accept=".csv" />
                            <span id="csvFileName" class="csv-file-name"></span>
                        </div>
                        <textarea id="message" name="message" rows="5"
                            placeholder="Enter IMEIs separated by commas or new lines&#10;Ex. 357650101213857, 357650357521654"></textarea>
                    </div>

                    <div>
                        <button id="manageButton" class="btn-primary">Apply Changes</button>
                    </div>
                </div>

                <!-- Results -->
                <div class="panel" style="flex:1; min-height:0;">
                    <div id="loadingIndicator" class="loading-indicator" hidden>
                        <span id="loadingText"></span>
                    </div>
                    <p class="results-label">Results</p>
                    <div class="results-table-wrapper">
                        <table id="manage-results">
                            <thead>
                                <tr>
                                    <th>IMEI</th>
                                    <th>Action</th>
                                    <th>Result</th>
                                    <th>Note</th>
                                </tr>
                            </thead>
                            <tbody id="manage-results-body"></tbody>
                        </table>
                    </div>
                    <div id="export-clear-log">
                        <button id="exportButton">Export CSV</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
