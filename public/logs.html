<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>SurfSight Device Manager</title>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div id="sidebar-header">
                <div class="app-name">SurfSight</div>
                <div class="app-sub">Device Manager</div>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html"><span class="nav-icon">⚙</span> Manage</a></li>
                    <li><a href="validate.html"><span class="nav-icon">✓</span> Verify</a></li>
                    <li><a href="logs.html" class="active"><span class="nav-icon">☰</span> Logs</a></li>
                </ul>
            </nav>
        </aside>

        <div id="main">
            <div id="page-header">
                <h1>Run History</h1>
                <p>Review past operations and their results</p>
            </div>

            <div id="page-content">
                <!-- Search -->
                <div class="panel">
                    <div class="panel-title">Search</div>
                    <input id="search-bar" type="text" placeholder="Search logs...">
                </div>

                <!-- Run List -->
                <div class="panel">
                    <p class="results-label">Runs</p>
                    <div class="results-table-wrapper">
                        <table id="log-runs">
                            <thead>
                                <tr>
                                    <th>Run ID</th>
                                    <th>Date / Time</th>
                                    <th>Action</th>
                                    <th>Performed By</th>
                                </tr>
                            </thead>
                            <tbody id="run-results-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Run Detail -->
                <div class="panel" style="flex:1; min-height:0;">
                    <p class="results-label">Run Detail</p>
                    <div class="results-table-wrapper">
                        <table id="run-results">
                            <thead>
                                <tr>
                                    <th>IMEI</th>
                                    <th>Action</th>
                                    <th>Result</th>
                                    <th>Note</th>
                                </tr>
                            </thead>
                            <tbody id="log-run-results-body"></tbody>
                        </table>
                    </div>
                    <div id="export-clear-log">
                        <button id="exportButton">Export CSV</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
