<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>SurfSight Device Manager</title>
</head>
<body class="login-page">
    <div id="loginSection">
        <h1>Connect to SurfSight</h1>
        <form id="surf-login-form">
            <label>
                Email
                <input type="email" id="surfEmail" placeholder="you@example.com" required />
            </label>
            <label>
                Password
                <input type="password" id="surfPassword" placeholder="••••••••" required />
            </label>
            <label class="remember-row">
                <input type="checkbox" id="rememberMe" />
                Remember me
            </label>
            <button type="submit">Sign In</button>
        </form>
        <p id="surfAuthStatus"></p>
    </div>
    <script src="login.js"></script>
</body>
</html>
